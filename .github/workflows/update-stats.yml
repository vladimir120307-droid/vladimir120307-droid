name: Update repo stats

on:
  schedule:
    # Каждый день в 04:00 UTC (07:00 МСК)
    - cron: "0 4 * * *"
  workflow_dispatch: {}
  push:
    branches: [master, main]
    paths:
      - "scripts/update_stats.py"
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Aggregate stats across all repos
        env:
          # STATS_TOKEN — PAT с правом `repo` (для traffic + приватных репо).
          # Если не задан — fallback на GITHUB_TOKEN (увидит только текущий репо).
          GH_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: python scripts/update_stats.py

      - name: Commit & push if changed
        run: |
          git config user.name  "stats-bot"
          git config user.email "stats-bot@users.noreply.github.com"
          git add README.md data/traffic_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(stats): обновление статистики $(date -u +%Y-%m-%d)"
            git push
          fi
